name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest -v
      - name: Smoke-test the CLI
        run: |
          python -m drawio_digest tests/fixtures/lanes.drawio --stdout
          python -m drawio_digest tests/fixtures/lanes.drawio -f json --stdout
